services:
  postgres:
    image: postgres:17-alpine
    container_name: slo-postgres
    environment:
      POSTGRES_USER: slo
      POSTGRES_PASSWORD: slo
      POSTGRES_DB: slo_control_plane
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slo -d slo_control_plane"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - heatmap

  clickhouse-server:
    image: clickhouse/clickhouse-server@sha256:a4202d2f7a0c0ac98aca2bda670f5b7278722463c0bdd4c2de5241e8e1e898ed  # clickhouse/clickhouse-server:latest-alpine, resolved 2026-07-04 (latest moves)
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.d/default-password.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--host", "localhost", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - heatmap

  otel-collector:
    # Pinned: the clickhouseexporter metrics config (metrics_tables block, default
    # otel_metrics_* table names) is verified against 0.155.0. Bump deliberately.
    image: otel/opentelemetry-collector-contrib@sha256:4935caa35e9a4cb387e35732e8fb22b2b5759af8d12e7043357f03837f6e8df5  # otel/opentelemetry-collector-contrib:0.155.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      clickhouse-server:
        condition: service_healthy
    networks:
      - heatmap

  trace-generator:
    build:
      context: ../trace-generator
      dockerfile: Dockerfile
    container_name: trace-generator
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - BURN_PROFILE=deterministic
      - BURN_STEEP_ROUTE=/cart/checkout
      - BURN_STEEP_ERROR_RATE=0.003
      - BURN_SLOW_ROUTE=/api/auth
      - BURN_SLOW_ERROR_RATE=0.001
    depends_on:
      - otel-collector
    networks:
      - heatmap

  slo-control-plane:
    build:
      context: ../services/slo-control-plane
      dockerfile: Dockerfile
    container_name: slo-control-plane
    environment:
      SLO_API_HTTP_ADDR: ":8080"
      SLO_API_POSTGRES_DSN: "postgres://slo:slo@postgres:5432/slo_control_plane?sslmode=disable"
      SLO_API_CLICKHOUSE_DSN: "clickhouse://clickhouse-server:9000/default"
      SLO_API_OTEL_SERVICE_NAME: "slo-control-plane"
      SLO_API_OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4318"
      SLO_API_OTEL_EXPORTER_OTLP_INSECURE: "true"
      SLO_API_OUTBOX_POLL_INTERVAL: "5s"
      SLO_API_OUTBOX_BATCH_SIZE: "100"
      SLO_API_GRAFANA_URL: "http://grafana:3000"
      SLO_API_GRAFANA_TOKEN: "${SLO_GRAFANA_TOKEN:-}"
      SLO_API_GRAFANA_FOLDER_UID: "${SLO_GRAFANA_FOLDER_UID:-slo-managed}"
      SLO_API_ALERT_RECONCILER_POLL_INTERVAL: "${SLO_API_ALERT_RECONCILER_POLL_INTERVAL:-30s}"
      SLO_API_ALERT_RECONCILER_BATCH_SIZE: "${SLO_API_ALERT_RECONCILER_BATCH_SIZE:-100}"
      SLO_API_GRAFANA_HTTP_TIMEOUT: "${SLO_API_GRAFANA_HTTP_TIMEOUT:-10s}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse-server:
        condition: service_healthy
    networks:
      - heatmap

  slo-evaluator:
    build:
      context: ../services/slo-control-plane
      dockerfile: Dockerfile.evaluator
    container_name: slo-evaluator
    environment:
      SLO_API_POSTGRES_DSN: "postgres://slo:slo@postgres:5432/slo_control_plane?sslmode=disable"
      SLO_API_CLICKHOUSE_DSN: "clickhouse://clickhouse-server:9000/default"
      SLO_API_OTEL_SERVICE_NAME: "slo-evaluator"
      SLO_API_OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4318"
      SLO_API_OTEL_EXPORTER_OTLP_INSECURE: "true"
      SLO_API_EVALUATOR_INTERVAL: "30s"
      SLO_API_EVALUATOR_CONTINUE_INTERVAL: "5m"
      SLO_API_EVALUATOR_FAST_WINDOW_MIN: "5"
      SLO_API_EVALUATOR_SLOW_WINDOW_MIN: "60"
      SLO_API_EVALUATOR_FAST_BURN_RATE: "14.4"
      SLO_API_EVALUATOR_SLOW_BURN_RATE: "2.0"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse-server:
        condition: service_healthy
      slo-control-plane:
        condition: service_started
    networks:
      - heatmap

  grafana:
    image: grafana/grafana:12.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_LOG_LEVEL=info
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=jordo-heatmap-bubbles-panel,jordo-timeseries-selection-panel,jordo-heatmap-bubbles-app,jordo-slo-bubbles-app
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ../plugins/heatmap-panel/dist:/var/lib/grafana/plugins/jordo-heatmap-bubbles-panel
      - ../plugins/timeseries-selection-panel/dist:/var/lib/grafana/plugins/jordo-timeseries-selection-panel
      - ../plugins/heatmap-app/dist:/var/lib/grafana/plugins/jordo-heatmap-bubbles-app
      - ../plugins/slo-app/dist:/var/lib/grafana/plugins/jordo-slo-bubbles-app
    depends_on:
      clickhouse-server:
        condition: service_healthy
      slo-control-plane:
        condition: service_started
      slo-evaluator:
        condition: service_started
    networks:
      - heatmap

  tempo:
    image: grafana/tempo@sha256:ef4384fce6e8ad22b95b243d8fc165628cda655376fd50e7850536ad89d71d50  # grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3200/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - heatmap

  prometheus:
    image: prom/prometheus@sha256:6559acbd5d770b15bb3c954629ce190ac3cbbdb2b7f1c30f0385c4e05104e218  # prom/prometheus:v3.1.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/ready | grep -q Ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - heatmap

  loki:
    image: grafana/loki@sha256:8af2de1abbdd7aa92b27c9bcc96f0f4140c9096b507c77921ffddf1c6ad6c48f  # grafana/loki:3.3.2
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - heatmap

networks:
  heatmap:

volumes:
  grafana-data:
  tempo-data:
  prometheus-data:
  loki-data:
