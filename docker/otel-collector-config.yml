receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  clickhouse:
    endpoint: tcp://clickhouse-server:9000?dial_timeout=10s
    database: default
    traces_table_name: otel_traces
    logs_table_name: otel_logs
    # Metrics use the exporter's default per-type table names (otel_metrics_gauge,
    # otel_metrics_sum, ...). Collector image is pinned to contrib 0.155.0
    # (docker-compose.yml), whose clickhouseexporter dropped the old `metrics_table_name`
    # prefix key in favour of a `metrics_tables:` block — its defaults already produce
    # otel_metrics_gauge, so no override. Re-verify the exporter version and keys if the
    # pinned tag is bumped (campaign P1 step 1).
    create_schema: true
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    # status.code is intentionally NOT listed here: spanmetricsconnector 0.155.0
    # treats it as a reserved default dimension (always emitted as the
    # `status_code` label from span.Status().Code()) and fails config validation
    # ("duplicate dimension name") if it's also listed under dimensions. The
    # INV-1 label set (http_route/host_region/status_code) still ends up on
    # every series — verified in task-2-report.md.
    dimensions:
      - name: http.route
      - name: host.region
    metrics_flush_interval: 15s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse, otlp/tempo, spanmetrics]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [clickhouse, prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse, otlphttp/loki]
