receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  clickhouse:
    endpoint: tcp://clickhouse-server:9000?dial_timeout=10s
    database: default
    traces_table_name: otel_traces
    logs_table_name: otel_logs
    # Metrics use the exporter's default per-type table names (otel_metrics_gauge,
    # otel_metrics_sum, ...). Collector image is pinned to contrib 0.155.0
    # (docker-compose.yml), whose clickhouseexporter dropped the old `metrics_table_name`
    # prefix key in favour of a `metrics_tables:` block — its defaults already produce
    # otel_metrics_gauge, so no override. Re-verify the exporter version and keys if the
    # pinned tag is bumped (campaign P1 step 1).
    create_schema: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
