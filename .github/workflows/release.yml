name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'Release mode'
        required: true
        default: 'publish-now'
        type: choice
        options:
          - publish-now
          - version-only

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required so changeset can diff against the base branch
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish plugin artifacts now
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'publish-now' }}
        run: npm run publish-plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          # Set this repo variable to enable private plugin signing (comma-separated
          # Grafana instance root URLs). Unset -> unsigned zips are published.
          GRAFANA_SIGN_ROOT_URLS: ${{ vars.GRAFANA_SIGN_ROOT_URLS }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Version PR or Publish (Changesets)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'version-only' }}
        id: changesets
        uses: changesets/action@v1
        with:
          # Pending changesets exist: bump versions and open/update the version PR.
          # No changesets remain (version PR was merged): run publish.
          version: npm run version-packages
          publish: npm run publish-plugins
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          GRAFANA_SIGN_ROOT_URLS: ${{ vars.GRAFANA_SIGN_ROOT_URLS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
